<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G2 Elite Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0f1115] text-white">
    <div id="root">
        <div class="flex items-center justify-center h-screen">
            <p class="text-pink-500 font-bold animate-pulse">CARGANDO INTERFAZ G2...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CARACTERISTICAS = ['Ojos', 'Rostro', 'Busto', 'Cola', 'Cintura', 'Cabello', 'Estatura', 'Sensualidad', 'Dulzura', 'Elegancia'];

        const App = () => {
            const [perfiles, setPerfiles] = useState([]);
            const [activeTab, setActiveTab] = useState('EXPLORAR');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ 
                nombre: '', ciudad: '', profesion: '', fotos: [], 
                puntuaciones: Object.fromEntries(CARACTERISTICAS.map(c => [c, 50])) 
            });

            const getPromedio = (p) => {
                const vals = Object.values(p.puntuaciones);
                return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
            };

            const guardar = (e) => {
                e.preventDefault();
                setPerfiles([...perfiles, { ...formData, id: Date.now() }]);
                setIsModalOpen(false);
            };

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    {/* Barra Lateral */}
                    <aside className="w-64 bg-[#16191f] border-r border-white/5 flex flex-col p-6 shrink-0">
                        <h1 className="text-4xl font-black text-pink-500 italic text-center mb-10">G2</h1>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setActiveTab('EXPLORAR')} className={`w-full text-left p-3 rounded-xl font-bold ${activeTab === 'EXPLORAR' ? 'bg-pink-600' : 'text-gray-400'}`}>Explorar</button>
                            <button onClick={() => setActiveTab('RANKING')} className={`w-full text-left p-3 rounded-xl font-bold ${activeTab === 'RANKING' ? 'bg-pink-600' : 'text-gray-400'}`}>Ranking</button>
                        </nav>
                        <button onClick={() => setIsModalOpen(true)} className="mt-4 bg-white text-black py-4 rounded-xl font-black uppercase text-xs hover:bg-pink-500 hover:text-white transition-all">+ Agregar Perfil</button>
                    </aside>

                    {/* Contenido Principal */}
                    <main className="flex-1 overflow-y-auto p-10">
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {perfiles.map(p => (
                                <div key={p.id} className="bg-[#16191f] rounded-2xl overflow-hidden border border-white/5">
                                    <div className="aspect-[3/4] bg-gray-800">
                                        {p.fotos[0] && <img src={p.fotos[0]} className="w-full h-full object-cover" />}
                                    </div>
                                    <div className="p-4">
                                        <p className="font-bold">{p.nombre}</p>
                                        <p className="text-pink-500 text-xs font-black">{getPromedio(p)} SCORE</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modal para agregar */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-[#16191f] w-full max-w-lg rounded-3xl p-8 border border-white/10">
                                <h2 className="text-xl font-black text-pink-500 mb-6 uppercase">Nuevo Registro</h2>
                                <form onSubmit={guardar} className="space-y-4">
                                    <input placeholder="Nombre" className="w-full bg-[#0f1115] p-3 rounded-xl border border-white/5 text-white" onChange={e => setFormData({...formData, nombre: e.target.value})} required />
                                    <input placeholder="Ciudad" className="w-full bg-[#0f1115] p-3 rounded-xl border border-white/5 text-white" onChange={e => setFormData({...formData, ciudad: e.target.value})} />
                                    <div className="max-h-40 overflow-y-auto space-y-2">
                                        {CARACTERISTICAS.map(c => (
                                            <div key={c} className="flex justify-between items-center text-xs">
                                                <span>{c}</span>
                                                <input type="range" className="w-24 accent-pink-500" onChange={e => setFormData({...formData, puntuaciones: {...formData.puntuaciones, [c]: parseInt(e.target.value)}})} />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-gray-700 py-3 rounded-xl font-bold">Cancelar</button>
                                        <button type="submit" className="flex-1 bg-pink-600 py-3 rounded-xl font-bold">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
